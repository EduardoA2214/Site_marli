<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conhecendo a Biblioteca</title>
    <link rel="icon" type="image/png" href="../img/icone.png">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style/Conhecendo_biblioteca.css">
</head>
<body class="page-biblioteca">

    <main class="container">
        <h1>Venha explorar conosco</h1>

        <section class="carousel-container">
            <div class="carousel">
                <div class="carousel-item active">
                    <img src="../img/conhecendo1.jpeg" alt="Conhecendo 1">
                </div>
                <div class="carousel-item">
                    <img src="../img/Conhecendo2.jpeg" alt="Conhecendo 2">
                </div>
                <div class="carousel-item">
                    <img src="../img/conhecendo3.jpeg" alt="Conhecendo 3">
                </div>
                <div class="carousel-item">
                    <img src="../img/conhecendo4.jpeg" alt="Conhecendo 4">
                </div>

                <button class="prev" onclick="changeSlide(-1)" aria-label="Slide anterior">❮</button>
                <button class="next" onclick="changeSlide(1)" aria-label="Próximo slide">❯</button>
            </div>
        </section>

        <section class="back-section">
            <a href="../index.html" class="btn-interactive" style="text-decoration: none;">
                <i class="fas fa-arrow-left"></i> Voltar para a página inicial
            </a>
        </section>
    </main>

    <script src="../script/Conhecendo_biblioteca.js"></script>
</body>
</html>
